apiVersion: apps/v1
kind: Deployment
metadata:
  name: expenses-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: expenses-service
  template:
    metadata:
      labels:
        app: expenses-service
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z mysql 3306; do echo waiting for mysql; sleep 1; done"
      containers:
        - name: expenses-service
          image: pravalika2/expenses-service:latest
          ports:
            - containerPort: 5002
          env:
            - name: DATABASE_URL
              value: "mysql+pymysql://root:password@mysql:3306/expenses_db"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: USERS_SERVICE_URL
              value: "http://users-service:5001"
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: expenses-service
spec:
  selector:
    app: expenses-service
  ports:
    - port: 5002
      targetPort: 5002